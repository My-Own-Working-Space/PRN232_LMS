services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: prn232_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
    ports:
      - "1434:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./LMSDB.sql:/tmp/LMSDB.sql:ro
      - ./entrypoint.sh:/tmp/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/tmp/entrypoint.sh", "db"]
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -b -Q \"IF DB_ID('LMSDatabase') IS NOT NULL AND OBJECT_ID('LMSDatabase..Student') IS NOT NULL PRINT 'OK' ELSE RAISERROR('Not ready', 16, 1)\""]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 15s

  api:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: prn232_api
    ports:
      - "5288:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ConnectionStrings__DefaultConnection=Server=db,1433;Database=${DB_NAME};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=true
    depends_on:
      db:
        condition: service_healthy

volumes:
  sqlserver_data:
